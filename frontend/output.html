<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>tinyman — SDK Vault</title>
<link rel="icon" type="image/x-icon" href="/static/images/favicon.ico?v=1">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{
  width:100vw;height:100vh;overflow:hidden;
  background:#0e0c08;
  display:flex;align-items:center;justify-content:center;
  font-family:'Press Start 2P',monospace;
}
#wrap{
  position:relative;width:900px;height:580px;
  box-shadow:0 0 0 3px #111,0 0 0 6px #1e1a10,0 40px 100px rgba(0,0,0,.8);
  overflow:hidden;cursor:none;
}
canvas{position:absolute;top:0;left:0;image-rendering:pixelated;image-rendering:crisp-edges;}
#bg{z-index:1;}
#ov{z-index:10;pointer-events:none;}

/* ── CURSOR ── */
#cursor{position:absolute;z-index:100;pointer-events:none;width:16px;height:16px;margin:-8px 0 0 -8px;}
.cur-h{position:absolute;top:50%;left:0;width:100%;height:1.5px;background:rgba(245,158,11,.8);transform:translateY(-50%);}
.cur-v{position:absolute;left:50%;top:0;width:1.5px;height:100%;background:rgba(245,158,11,.8);transform:translateX(-50%);}
.cur-c{position:absolute;top:50%;left:50%;width:5px;height:5px;background:#f59e0b;transform:translate(-50%,-50%);}

/* ── PLAYER ── */
#player{position:absolute;z-index:30;pointer-events:none;width:20px;height:26px;}
#player-shadow{position:absolute;z-index:29;pointer-events:none;width:18px;height:5px;background:radial-gradient(ellipse,rgba(0,0,0,.5),transparent 70%);}
#nametag{
  position:absolute;z-index:31;pointer-events:none;
  white-space:nowrap;background:rgba(10,8,4,.9);
  border:1.5px solid rgba(245,158,11,.5);color:#f59e0b;
  font-size:5px;padding:2px 5px;transform:translateX(-50%);
}

/* ── TOP HUD ── */
#topbar{
  position:absolute;top:0;left:0;right:0;height:28px;z-index:50;
  background:rgba(10,8,4,.96);border-bottom:1px solid rgba(245,158,11,.2);
  display:flex;align-items:center;padding:0 14px;gap:14px;pointer-events:auto;
}
.tb-logo{font-size:8px;color:#f59e0b;text-shadow:0 0 12px rgba(245,158,11,.4);}
.tb-sep{font-size:8px;color:rgba(255,255,255,.15);}
.tb-room{font-size:5px;color:rgba(255,255,255,.3);flex:1;}
.tb-url{font-size:5px;color:rgba(245,158,11,.5);max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tb-user{font-size:5px;color:rgba(255,255,255,.35);display:flex;align-items:center;gap:5px;}
.tb-dot{width:5px;height:5px;background:#f59e0b;border-radius:50%;display:inline-block;animation:glow 2s ease infinite;}
@keyframes glow{0%,100%{box-shadow:0 0 4px #f59e0b;}50%{box-shadow:0 0 12px #f59e0b,0 0 20px rgba(245,158,11,.3);}}
.tb-btn{font-family:'Press Start 2P',monospace;font-size:5px;padding:4px 8px;border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.3);background:transparent;cursor:pointer;}
.tb-btn:hover{border-color:rgba(245,158,11,.5);color:rgba(245,158,11,.7);}

/* ── SIDE CODE PANEL ── */
#codepanel{
  position:absolute;top:28px;right:0;bottom:0;width:420px;z-index:55;
  background:#07060a;
  border-left:2px solid rgba(245,158,11,.5);
  box-shadow:-10px 0 40px rgba(0,0,0,.6);
  display:flex;flex-direction:column;
  transform:translateX(100%);
  transition:transform .25s cubic-bezier(.17,.67,.35,1.15);
}
#codepanel.open{transform:translateX(0);}

.cp-head{
  background:#0d0b06;
  border-bottom:1px solid rgba(245,158,11,.2);
  padding:10px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0;
}
.cp-title{font-size:7px;color:#f59e0b;flex:1;}
.cp-close{font-size:7px;color:rgba(255,255,255,.3);cursor:pointer;padding:2px 6px;border:1px solid rgba(255,255,255,.1);}
.cp-close:hover{color:#f59e0b;border-color:rgba(245,158,11,.4);}

.cp-meta{
  padding:8px 14px;background:#08070a;
  border-bottom:1px solid rgba(245,158,11,.1);
  font-size:5px;color:rgba(255,255,255,.3);line-height:2;flex-shrink:0;
}
.cp-meta .hl{color:#f59e0b;}

.cp-code{
  flex:1;overflow:auto;
  font-size:10px;line-height:1.6;
}
.cp-code pre{margin:0;height:100%;}
.cp-code pre code{
  padding:14px !important;
  font-size:10px !important;
  font-family:'Courier New',monospace !important;
  background:transparent !important;
}
/* Scrollbar */
.cp-code::-webkit-scrollbar{width:6px;}
.cp-code::-webkit-scrollbar-track{background:#07060a;}
.cp-code::-webkit-scrollbar-thumb{background:rgba(245,158,11,.3);border-radius:0;}
.cp-code::-webkit-scrollbar-thumb:hover{background:rgba(245,158,11,.6);}

.cp-actions{
  padding:10px 14px 12px;background:#0d0b06;
  border-top:1px solid rgba(245,158,11,.2);
  display:flex;flex-direction:column;gap:7px;flex-shrink:0;
}
.cp-btn{
  font-family:'Press Start 2P',monospace;font-size:6px;
  padding:9px 14px;border:2px solid;cursor:pointer;
  letter-spacing:1px;width:100%;text-align:center;
  position:relative;transition:none;
}
.cp-btn.primary{background:rgba(245,158,11,.15);color:#f59e0b;border-color:#f59e0b;box-shadow:3px 3px 0 rgba(245,158,11,.3);}
.cp-btn.primary:hover{background:rgba(245,158,11,.25);transform:translate(-1px,-1px);box-shadow:4px 4px 0 rgba(245,158,11,.4);}
.cp-btn.secondary{background:transparent;color:rgba(255,255,255,.4);border-color:rgba(255,255,255,.15);}
.cp-btn.secondary:hover{border-color:rgba(245,158,11,.4);color:rgba(245,158,11,.6);}
.cp-btn:active{transform:translate(2px,2px)!important;box-shadow:1px 1px 0!important;}

.cp-copied{
  font-size:5px;color:#4ade80;text-align:center;
  height:10px;opacity:0;transition:opacity .3s;
}
.cp-copied.show{opacity:1;}

/* ── CONFETTI ── */
.confetti-piece{
  position:absolute;z-index:45;pointer-events:none;
  width:6px;height:6px;
  animation:fall linear forwards;
}
@keyframes fall{
  0%{transform:translateY(-20px) rotate(0deg);opacity:1;}
  100%{transform:translateY(620px) rotate(720deg);opacity:0;}
}

/* ── MINIMAP ── */
#mmap-wrap{position:absolute;bottom:10px;left:12px;z-index:50;border:1px solid rgba(245,158,11,.2);background:rgba(8,6,3,.9);padding:2px;pointer-events:none;}
#mmap{display:block;image-rendering:pixelated;}

/* ── SCREEN TRANSITION ── */
#cover{position:fixed;inset:0;background:#000;opacity:0;pointer-events:none;transition:opacity .4s;z-index:999;}
#cover.on{opacity:1;}

/* ── SCANLINES ── */
#scanlines{position:absolute;inset:0;z-index:5;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px);}
</style>
</head>
<body>
<div id="wrap">
  <div id="scanlines"></div>
  <canvas id="bg" width="900" height="580"></canvas>
  <canvas id="ov" width="900" height="580"></canvas>

  <!-- TOP BAR -->
  <div id="topbar">
    <span class="tb-logo">tinyman</span>
    <span class="tb-sep">/</span>
    <span class="tb-room">▶ SDK VAULT — FLOOR 3</span>
    <span class="tb-url" id="tb-url"></span>
    <span class="tb-user"><span class="tb-dot"></span><span id="tb-user">HACKER</span></span>
    <button class="tb-btn" onclick="goMain()">NEW SDK</button>
    <button class="tb-btn" onclick="logout()">LOGOUT</button>
  </div>

  <!-- MINIMAP -->
  <div id="mmap-wrap"><canvas id="mmap" width="90" height="58"></canvas></div>

  <!-- CURSOR -->
  <div id="cursor"><div class="cur-h"></div><div class="cur-v"></div><div class="cur-c"></div></div>

  <!-- PLAYER -->
  <div id="player-shadow"></div>
  <div id="player"></div>
  <div id="nametag">YOU</div>

  <!-- CODE PANEL (slides in from right) -->
  <div id="codepanel">
    <div class="cp-head">
      <div class="cp-title">SDK OUTPUT</div>
      <span class="cp-close" onclick="closePanel()">✕ CLOSE</span>
    </div>
    <div class="cp-meta">
      <span class="hl">TARGET:</span> <span id="cp-url">—</span><br>
      <span class="hl">LINES:</span> <span id="cp-lines">—</span> &nbsp;
      <span class="hl">SIZE:</span> <span id="cp-size">—</span> &nbsp;
      <span class="hl">LANG:</span> <span class="hl">PYTHON</span>
    </div>
    <div class="cp-code"><pre><code class="language-python" id="cp-code-el"></code></pre></div>
    <div class="cp-actions">
      <button class="cp-btn primary" onclick="copyCode()">COPY TO CLIPBOARD</button>
      <div class="cp-copied" id="cp-copied">COPIED TO CLIPBOARD</div>
      <button class="cp-btn secondary" onclick="goMain()">SYNTHESIZE ANOTHER</button>
      <button class="cp-btn secondary" onclick="goAuth()">BACK TO LOBBY</button>
    </div>
  </div>
</div>

<div id="cover"></div>

<script>
// ── AUTH + DATA CHECK ─────────────────────────────────────────
const jwt=localStorage.getItem('jwt_token');
if(!jwt){go('/auth');}
const code=localStorage.getItem('generatedCode')||'# No SDK generated yet.\n# Please return to the lab.\nprint("hello from tinyman!")';
const genUrl=localStorage.getItem('generatedUrl')||'https://api.example.com';

try{
  const p=JSON.parse(atob(jwt.split('.')[1]));
  const n=(p.name||p.login||p.email||'HACKER').toUpperCase().slice(0,10);
  document.getElementById('tb-user').textContent=n;
  document.getElementById('nametag').textContent=n;
}catch(e){}

document.getElementById('tb-url').textContent=genUrl;
document.getElementById('cp-url').textContent=genUrl;
const lines=code.split('\n').length;
document.getElementById('cp-lines').textContent=lines;
document.getElementById('cp-size').textContent=Math.ceil(code.length/1024)+'KB';
document.getElementById('cp-code-el').textContent=code;
hljs.highlightAll();

function go(u){document.getElementById('cover').classList.add('on');setTimeout(()=>{location.href=u;},400);}
function logout(){localStorage.removeItem('jwt_token');go('/auth');}
function goMain(){go('/main');}
function goAuth(){go('/auth');}
function copyCode(){
  navigator.clipboard.writeText(code).then(()=>{
    const el=document.getElementById('cp-copied');
    el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1800);
  });
}
function closePanel(){
  document.getElementById('codepanel').classList.remove('open');
  activeZone=false;
}

// ── WORLD CONSTANTS ───────────────────────────────────────────
const W=900,H=580,T=16,TH=28;

// ── CANVAS REFS ───────────────────────────────────────────────
const bg=document.getElementById('bg'); const bc=bg.getContext('2d'); bc.imageSmoothingEnabled=false;
const ov=document.getElementById('ov'); const oc=ov.getContext('2d'); oc.imageSmoothingEnabled=false;
const mm=document.getElementById('mmap'); const mc=mm.getContext('2d'); mc.imageSmoothingEnabled=false;

// ── DRAW UTILS ────────────────────────────────────────────────
const fl=Math.floor;
function r(c,x,y,w,h,col){c.fillStyle=col;c.fillRect(fl(x),fl(y),w,h);}
function shd(col,amt){
  let c2=col.replace('#','');if(c2.length===3)c2=c2[0]+c2[0]+c2[1]+c2[1]+c2[2]+c2[2];
  let rr=parseInt(c2.slice(0,2),16),gg=parseInt(c2.slice(2,4),16),bb=parseInt(c2.slice(4,6),16);
  return`rgb(${Math.max(0,Math.min(255,fl(rr+255*amt)))},${Math.max(0,Math.min(255,fl(gg+255*amt)))},${Math.max(0,Math.min(255,fl(bb+255*amt)))})`;
}
function tile(c,x,y,w,h,c1,c2,ts=T){
  for(let ty=0;ty<h;ty+=ts)for(let tx=0;tx<w;tx+=ts){
    c.fillStyle=(fl(tx/ts)+fl(ty/ts))%2===0?c1:c2;
    c.fillRect(fl(x+tx),fl(y+ty),Math.min(ts,w-tx),Math.min(ts,h-ty));
  }
}

// ── PIXEL ART PRIMITIVES ──────────────────────────────────────
function desk(c,x,y,w=52,h=28,col='#a07830'){
  const dk=shd(col,-.2),lt=shd(col,.18);
  r(c,x,y,w,h,col);r(c,x,y,w,2,lt);r(c,x,y,2,h,lt);
  r(c,x,y+h-3,w,3,dk);r(c,x+w-2,y,2,h,dk);
  c.strokeStyle='rgba(0,0,0,.3)';c.lineWidth=1;c.strokeRect(fl(x)+.5,fl(y)+.5,w-1,h-1);
}
function monitor(c,x,y,col='#0a1a0a'){
  r(c,x,y,28,20,'#111');r(c,x+2,y+2,24,14,col);
  c.fillStyle='rgba(245,158,11,.55)';c.font='4px monospace';
  c.fillText('>>>',x+4,y+9);
  c.fillStyle='rgba(245,158,11,.3)';
  for(let i=1;i<3;i++)c.fillRect(fl(x+4),fl(y+4+i*5),10+i*3,1);
  r(c,x+10,y+20,8,3,'#1a1a20');r(c,x+6,y+23,16,2,'#222');
}
function chair(c,x,y,col='#3a2a10'){
  c.fillStyle=col;c.beginPath();c.ellipse(fl(x+8),fl(y+9),7,7,0,0,Math.PI*2);c.fill();
  c.fillStyle=shd(col,.2);c.beginPath();c.ellipse(fl(x+6),fl(y+7),3,3,0,0,Math.PI*2);c.fill();
  r(c,x+1,y-4,14,5,shd(col,-.1));
  c.strokeStyle='rgba(0,0,0,.3)';c.lineWidth=1;c.beginPath();c.ellipse(fl(x+8),fl(y+9),7,7,0,0,Math.PI*2);c.stroke();
}
function plant(c,x,y,t=0){
  if(t===0){
    c.fillStyle='#2a5c1a';c.beginPath();c.ellipse(fl(x+9),fl(y+9),8,7,0,0,Math.PI*2);c.fill();
    c.fillStyle='#3a8a2a';c.beginPath();c.ellipse(fl(x+7),fl(y+8),5,5,0,0,Math.PI*2);c.fill();
    c.fillStyle='#50b040';c.beginPath();c.ellipse(fl(x+11),fl(y+5),4,4,0,0,Math.PI*2);c.fill();
    r(c,x+5,y+14,8,5,'#8a5028');r(c,x+4,y+14,10,2,'#b07040');
  }else if(t===1){
    r(c,x+5,y+5,6,12,'#2a5c1a');r(c,x+3,y+1,10,8,'#3a8a2a');r(c,x+5,y-2,6,6,'#50b040');
    r(c,x+6,y+15,4,5,'#8a5028');r(c,x+5,y+15,6,2,'#b07040');
  }else{
    r(c,x+3,y+9,10,6,'#8a5028');r(c,x+2,y+9,12,2,'#b07040');
    r(c,x+5,y+3,6,8,'#3a8a2a');r(c,x+3,y+5,4,5,'#2a5c1a');r(c,x+9,y+5,4,5,'#2a5c1a');
  }
}
function npc(c,x,y,name,bodyCol='#3a7acc',celebrating=false){
  if(celebrating){
    r(c,x-5,y-18,10,8,'#f5b87a');r(c,x-5,y-18,10,2,'#2a1a08');
    // arms raised
    r(c,x-10,y-16,5,6,bodyCol);r(c,x+5,y-16,5,6,bodyCol);
    r(c,x-5,y-10,10,8,bodyCol);
    r(c,x-4,y-2,4,5,'#111');r(c,x,y-2,4,5,'#111');
  }else{
    r(c,x-5,y-18,10,8,'#f5b87a');r(c,x-5,y-18,10,2,'#2a1a08');
    r(c,x-5,y-10,10,8,bodyCol);
    r(c,x-4,y-2,4,5,'#111');r(c,x,y-2,4,5,'#111');
  }
  const nw=name.length*5+10;
  r(c,x-nw/2,y-30,nw,11,'rgba(10,8,4,.9)');
  c.strokeStyle='rgba(245,158,11,.35)';c.lineWidth=1;c.strokeRect(fl(x-nw/2)+.5,fl(y-30)+.5,nw-1,10);
  r(c,x-nw/2+4,y-25,3,3,'#f59e0b');
  c.fillStyle='#fff';c.font='5px "Press Start 2P"';c.textAlign='center';c.fillText(name,x,y-22);c.textAlign='left';
}

// ── BIG OUTPUT TERMINAL (the vault machine) ──────────────────
const VX=260,VY=110; // vault terminal position

function drawVault(c,x,y){
  const w=140,h=110;
  // Main casing
  r(c,x,y+30,w,h,'#12100a');c.strokeStyle='rgba(245,158,11,.5)';c.lineWidth=2;c.strokeRect(fl(x)+1,fl(y+30)+1,w-2,h-2);
  r(c,x,y+30,w,3,shd('#12100a',.15));
  // Big screen
  r(c,x+8,y+36,w-16,56,'#080600');
  r(c,x+9,y+37,w-18,54,'#030201');

  // ── SCREEN CONTENT (pixel mock of code) ──
  const lineColors=['rgba(245,158,11,.8)','rgba(80,180,255,.7)','rgba(100,220,100,.6)','rgba(200,200,200,.4)','rgba(245,158,11,.5)'];
  c.font='3px monospace';
  const codeMock=[
    'class TinymanSDK:',
    '  def __init__(self):',
    '    self.base = endpoint',
    '    self.session = ...',
    '  def get(self, path):',
    '    return self._req(...)',
    '  def post(self, path):',
    '    return self._req(...)',
    '  def _req(self, m, p):',
    '    r = requests.req...',
    '    r.raise_for_status()',
    '    return r.json()',
  ];
  codeMock.forEach((line,i)=>{
    c.fillStyle=lineColors[i%lineColors.length];
    c.fillText(line, x+11, y+43+i*4.5);
  });

  // Scan line across screen (will be animated in overlay)
  r(c,x+9,y+37,w-18,1,'rgba(245,158,11,.06)');

  // Printer slot at bottom
  r(c,x+10,y+94,w-20,3,'#1a1600');r(c,x+11,y+94,w-22,1,'rgba(245,158,11,.3)');

  // Control panel
  r(c,x+8,y+100,w-16,20,'#0d0b06');
  // Buttons row
  const btnCols=['#f59e0b','#4ade80','#f87171','#60a5fa'];
  for(let i=0;i<4;i++){r(c,x+12+i*16,y+104,10,8,btnCols[i]);r(c,x+12+i*16,y+104,10,2,shd(btnCols[i],.3));}

  // Status LED row
  for(let i=0;i<6;i++){
    const on=i%3!==2;
    r(c,x+80+i*8,y+105,4,4,on?'#f59e0b':'#2a1800');
    if(on){r(c,x+81+i*8,y+106,2,2,'rgba(255,220,100,.5)');}
  }
  // Print label
  c.fillStyle='rgba(245,158,11,.7)';c.font='4px "Press Start 2P"';c.textAlign='center';
  c.fillText('OUTPUT TERMINAL',x+w/2,y+145);c.textAlign='left';

  // Paper tray (bottom) — printed SDK  
  r(c,x+15,y+143,w-30,12,'#f5f0e0');
  r(c,x+15,y+143,w-30,1,'rgba(0,0,0,.15)');
  // printed lines on paper
  for(let i=0;i<5;i++){
    r(c,x+18,y+145+i*2,fl((w-36)*(0.6+i*.08)),1,'rgba(0,0,0,.25)');
  }
  // paper left-edge fold
  r(c,x+15,y+143,2,12,'rgba(0,0,0,.1)');

  // ── GOLDEN GLOW AURA ──
  const grd=c.createRadialGradient(x+w/2,y+80,10,x+w/2,y+80,90);
  grd.addColorStop(0,'rgba(245,158,11,.18)');grd.addColorStop(1,'transparent');
  c.fillStyle=grd;c.fillRect(x-50,y+30,w+100,140);

  // Big label plate above
  r(c,x+10,y+16,w-20,14,'rgba(245,158,11,.15)');
  c.strokeStyle='rgba(245,158,11,.6)';c.lineWidth=1;c.strokeRect(fl(x+10)+.5,fl(y+16)+.5,w-21,13);
  c.fillStyle='#f59e0b';c.font='5px "Press Start 2P"';c.textAlign='center';
  c.fillText('SDK VAULT',x+w/2,y+26);c.textAlign='left';
}

// ── TROPHY SHELF ─────────────────────────────────────────────
function drawTrophyShelf(c,x,y){
  // shelf board
  r(c,x,y,140,10,'#a07030');r(c,x,y,140,2,shd('#a07030',.25));
  c.strokeStyle='rgba(0,0,0,.25)';c.lineWidth=1;c.strokeRect(fl(x)+.5,fl(y)+.5,139,9);
  // wall mount
  r(c,x+10,y+10,120,4,'rgba(0,0,0,.2)');
  // trophies
  const trophyCols=['#f59e0b','#c0c0c0','#cd7f32','#60a5fa'];
  for(let i=0;i<4;i++){
    const tx=x+12+i*32;const ty=y-20;
    // cup

// ── AWARD BANNER ─────────────────────────────────────────────
function drawBanner(c,x,y){

}

// ── PLAYER ───────────────────────────────────────────────────
const playerEl=document.getElementById('player');
const shadowEl=document.getElementById('player-shadow');
const nametag=document.getElementById('nametag');
const playerC=document.createElement('canvas');
playerC.width=20;playerC.height=26;
playerC.style.cssText='image-rendering:pixelated;position:absolute;top:0;left:0;';
playerEl.appendChild(playerC);
const pc=playerC.getContext('2d');pc.imageSmoothingEnabled=false;
let walkFrame=0,facingDir=1;

function drawPlayer(frame,dir){
  pc.clearRect(0,0,20,26);
  if(dir<0){pc.save();pc.scale(-1,1);pc.translate(-20,0);}
  pc.fillStyle='rgba(0,0,0,.2)';pc.beginPath();pc.ellipse(10,25,7,3,0,0,Math.PI*2);pc.fill();
  r(pc,5,0,10,6,'#2a1a08');r(pc,3,2,14,4,'#2a1a08');
  r(pc,4,4,12,8,'#f5b87a');r(pc,2,5,2,5,'#f5b87a');r(pc,16,5,2,5,'#f5b87a');
  r(pc,6,7,2,2,'#1a1020');r(pc,12,7,2,2,'#1a1020');
  r(pc,8,10,4,1,'#c8703a');
  r(pc,3,12,14,8,'#f59e0b'); // golden shirt for vault
  r(pc,2,13,1,5,'#d97706');r(pc,17,13,1,5,'#d97706');
  r(pc,3,19,14,2,'#1a1020');
  const lOff=frame%2===0?0:2;
  r(pc,4,21,5,5,'#3a2a10');r(pc,11,21,5,5,'#3a2a10');
  r(pc,4,21+lOff,5,2,'#5a4a20');r(pc,11,21+(2-lOff),5,2,'#5a4a20');
  r(pc,3,25,6,1,'#111');r(pc,11,25,6,1,'#111');
  if(dir<0)pc.restore();
}
let px=410,py=100;
drawPlayer(0,facingDir);
function syncPlayer(){
  playerEl.style.left=(px-10)+'px';playerEl.style.top=(py-26)+'px';
  shadowEl.style.left=(px-9)+'px';shadowEl.style.top=(py-2)+'px';
  nametag.style.left=px+'px';nametag.style.top=(py-42)+'px';
}
syncPlayer();

// ── INPUT ─────────────────────────────────────────────────────
const keys={};
addEventListener('keydown',e=>{keys[e.key]=true;if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key))e.preventDefault();});
addEventListener('keyup',  e=>{keys[e.key]=false;});
let clickTarget=null;
const wrap=document.getElementById('wrap');
wrap.addEventListener('mousemove',e=>{
  const rect=e.currentTarget.getBoundingClientRect();
  document.getElementById('cursor').style.left=((e.clientX-rect.left)*(W/rect.width))+'px';
  document.getElementById('cursor').style.top =((e.clientY-rect.top)*(H/rect.height))+'px';
});
wrap.addEventListener('click',e=>{
  if(activeZone)return;
  const rect=e.currentTarget.getBoundingClientRect();
  clickTarget={x:(e.clientX-rect.left)*(W/rect.width),y:(e.clientY-rect.top)*(H/rect.height)};
});

// ── VAULT ZONE ────────────────────────────────────────────────
const VAULT_ZONE={x:VX-40,y:VY+80,w:200,h:100};
let activeZone=false;
let vaultPanelDismissed=false;

function openPanel(){
  if(activeZone)return;
  activeZone=true;clickTarget=null;
  document.getElementById('codepanel').classList.add('open');
}
function closePanel2(){activeZone=false;document.getElementById('codepanel').classList.remove('open');}
// make the HTML close button work
document.querySelector('.cp-close').addEventListener('click',()=>{
  vaultPanelDismissed=true;
  closePanel2();
});

// ── OVERLAY ──────────────────────────────────────────────────
function drawOverlay(t){
  oc.clearRect(0,0,W,H);
  const vz=VAULT_ZONE;
  const dist=Math.hypot(px-(vz.x+vz.w/2),py-(vz.y+vz.h/2));
  const near=dist<130;

  // Vault screen flicker
  const sl=(t*.06)%56;
  oc.fillStyle='rgba(245,158,11,.05)';oc.fillRect(VX+9,VY+37,VX-9+115-VX,2);
  oc.fillStyle='rgba(245,158,11,.04)';oc.fillRect(VX+9,VY+37+sl,115,2);

  // Animated LEDs on vault
  for(let i=0;i<6;i++){
    const on=Math.floor((t*.003+i*.4))%3!==2;
    if(on){
      oc.fillStyle=`rgba(245,158,11,${0.4+0.4*Math.sin(t*.008+i)})`;
      oc.fillRect(fl(VX+82+i*8),fl(VY+105),4,4);
    }
  }

  // Golden aura pulsing from vault (always visible)
  const alpha=0.08+0.05*Math.sin(t*.004);
  const grd=oc.createRadialGradient(VX+70,VY+60,5,VX+70,VY+60,100);
  grd.addColorStop(0,`rgba(245,158,11,${alpha})`);grd.addColorStop(1,'transparent');
  oc.fillStyle=grd;oc.fillRect(VX-50,VY-10,260,180);

  if(near&&!activeZone){
    // Pulse outline around vault
    const pulse=0.3+0.25*Math.sin(t*.008);
    oc.strokeStyle='#f59e0b';oc.globalAlpha=pulse;oc.lineWidth=2;
    oc.setLineDash([6,4]);oc.strokeRect(VX+1.5,fl(VY+30)+1.5,140,112);oc.setLineDash([]);oc.globalAlpha=1;

    // Floating prompt
    const bob=Math.sin(t*.005)*4;
    oc.fillStyle='#f59e0b';oc.globalAlpha=0.9+0.1*Math.sin(t*.007);
    oc.beginPath();
    oc.moveTo(VX+70,VY+18+bob);oc.lineTo(VX+63,VY+26+bob);oc.lineTo(VX+77,VY+26+bob);
    oc.fill();
    oc.font='5px "Press Start 2P"';oc.textAlign='center';
    oc.fillText('VIEW SDK',VX+70,VY+14+bob);
    oc.globalAlpha=1;oc.textAlign='left';
  }

  // Click indicator
  if(clickTarget&&!activeZone){
    oc.strokeStyle='rgba(245,158,11,.6)';oc.lineWidth=1.5;
    oc.beginPath();oc.arc(fl(clickTarget.x),fl(clickTarget.y),6,(t*.01)%Math.PI*2,(t*.01)%Math.PI*2+Math.PI*1.5);oc.stroke();
  }
}

// ── MINIMAP ───────────────────────────────────────────────────
function drawMinimap(){
  const sx=90/W,sy=58/H;
  mc.fillStyle='#08060a';mc.fillRect(0,0,90,58);
  // vault zone
  mc.fillStyle='rgba(245,158,11,.2)';mc.fillRect(0,fl(TH*sy),fl(440*sx),fl(280*sy));
  mc.strokeStyle='rgba(245,158,11,.4)';mc.lineWidth=1;mc.strokeRect(.5,fl(TH*sy)+.5,fl(440*sx)-1,fl(280*sy)-1);
  // review desks
  mc.fillStyle='rgba(200,170,100,.15)';mc.fillRect(fl(440*sx),fl(TH*sy),fl(220*sx),fl(280*sy));
  // archive
  mc.fillStyle='rgba(0,0,0,.4)';mc.fillRect(fl(665*sx),fl(TH*sy),fl(225*sx),fl(380*sy));
  // lounge
  mc.fillStyle='rgba(180,160,120,.2)';mc.fillRect(0,fl((H-110)*sy),90,fl(110*sy));
  // vault terminal dot
  mc.fillStyle='rgba(245,158,11,.6)';mc.fillRect(fl(VX*sx),fl(VY*sy),fl(140*sx),fl(80*sy));
  // player
  mc.fillStyle='#f59e0b';mc.fillRect(fl(px*sx)-2,fl(py*sy)-2,4,4);
}

// ── GAME LOOP ─────────────────────────────────────────────────
const SPEED=2.5;
function loop(t){
  let dx=0,dy=0;
  if(keys['ArrowLeft'] ||keys['a']||keys['A'])dx=-1;
  if(keys['ArrowRight']||keys['d']||keys['D'])dx= 1;
  if(keys['ArrowUp']   ||keys['w']||keys['W'])dy=-1;
  if(keys['ArrowDown'] ||keys['s']||keys['S'])dy= 1;

  const anyKey=dx||dy;if(anyKey)clickTarget=null;
  if(!anyKey&&clickTarget&&!activeZone){
    const cdx=clickTarget.x-px,cdy=clickTarget.y-py;
    const d=Math.hypot(cdx,cdy);
    if(d<3)clickTarget=null;
    else{dx=cdx/d;dy=cdy/d;}
  }
  if((dx||dy)&&!activeZone){
    const len=Math.sqrt(dx*dx+dy*dy)||1;
    px+=dx/len*SPEED;py+=dy/len*SPEED;
    px=Math.max(12,Math.min(W-440-12,px)); // leave space for code panel
    py=Math.max(TH+16,Math.min(H-12,py));
    if(dx!==0)facingDir=dx<0?-1:1;
    walkFrame++;drawPlayer(walkFrame,facingDir);syncPlayer();
  }

  // Zone check
  const vz=VAULT_ZONE;
  const inZone=px>vz.x&&px<vz.x+vz.w&&py>vz.y&&py<vz.y+vz.h;
  if(inZone&&!activeZone&&!vaultPanelDismissed)openPanel();
  else if(!inZone){
    vaultPanelDismissed=false;
    if(activeZone&&!document.getElementById('codepanel').classList.contains('open'))closePanel2();
  }

  drawOverlay(t);drawMinimap();
  requestAnimationFrame(loop);
}

// Fade in on arrival
const cover=document.getElementById('cover');
cover.style.opacity='1';
setTimeout(()=>{cover.style.transition='opacity .5s';cover.style.opacity='0';setTimeout(()=>cover.classList.remove('on'),500);},80);

requestAnimationFrame(loop);
